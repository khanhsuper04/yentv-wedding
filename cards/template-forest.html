<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thiệp Cưới – Rừng Xanh</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100%}
    body{
      background:linear-gradient(160deg,#0a1a0d 0%,#0d2010 50%,#081508 100%);
      font-family:'Lato',sans-serif;font-weight:300;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:2rem 1rem;
      position:relative;overflow:hidden;
    }

    /* ===== FIREFLIES ===== */
    .firefly{
      position:fixed;width:5px;height:5px;border-radius:50%;
      background:radial-gradient(circle,#a8ff78,#78ff44);
      box-shadow:0 0 8px #a8ff78,0 0 20px rgba(168,255,120,.4);
      pointer-events:none;z-index:1;
      animation:fireflyMove ease-in-out infinite;
    }
    @keyframes fireflyMove{
      0%{transform:translate(0,0);opacity:0}
      20%{opacity:.9}
      50%{transform:translate(var(--tx),var(--ty));opacity:.6}
      80%{opacity:.8}
      100%{transform:translate(var(--tx2),var(--ty2));opacity:0}
    }

    /* ===== LEAVES ===== */
    .leaf{
      position:fixed;pointer-events:none;z-index:1;
      font-size:1rem;opacity:0;
      animation:leafFall linear infinite;
    }
    @keyframes leafFall{
      0%{transform:translateY(-30px) rotate(0deg) translateX(0);opacity:0}
      15%{opacity:.7}
      85%{opacity:.5}
      100%{transform:translateY(105vh) rotate(var(--rot)) translateX(var(--drift));opacity:0}
    }

    /* ===== CARD ===== */
    .card{
      position:relative;z-index:10;
      width:min(420px,93vw);
      background:rgba(10,26,13,.85);
      border:1px solid rgba(168,255,120,.15);
      border-radius:20px;
      padding:3rem 2.5rem;
      text-align:center;
      backdrop-filter:blur(30px);
      box-shadow:0 0 60px rgba(168,255,120,.08),0 30px 80px rgba(0,0,0,.7);
      animation:cardIn 1.2s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:none}}

    .leaf-top{font-size:1.5rem;letter-spacing:6px;opacity:.4;margin-bottom:1.2rem;animation:fadeUp .8s .3s both}
    .invite-text{font-size:.65rem;letter-spacing:4px;text-transform:uppercase;color:rgba(168,255,120,.4);margin-bottom:.8rem;animation:fadeUp .8s .5s both}
    .names{
      font-family:'Playfair Display',serif;
      font-size:clamp(1.8rem,6vw,2.5rem);
      color:#e8f5e9;line-height:1.15;
      animation:fadeUp .8s .7s both;
    }
    .names em{color:#a8ff78;font-style:italic}
    .amp{display:block;font-size:1rem;color:rgba(168,255,120,.3);margin:.3rem 0;letter-spacing:4px}

    .green-divider{
      display:flex;align-items:center;gap:.8rem;margin:1.3rem 0;
      animation:fadeUp .8s .9s both;
    }
    .green-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(168,255,120,.3),transparent)}
    .green-leaf{color:#a8ff78;font-size:.9rem;animation:sway 3s ease-in-out infinite}
    @keyframes sway{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}

    .info-row{
      display:flex;align-items:center;justify-content:center;gap:.6rem;
      margin:.65rem 0;font-size:.85rem;color:rgba(255,255,255,.5);
      animation:fadeUp .8s 1s both;
    }
    .info-icon{font-size:.9rem}
    .info-text{color:rgba(232,245,233,.7)}

    .countdown{
      display:flex;justify-content:center;gap:.8rem;margin:1.6rem 0;
      animation:fadeUp .8s 1.1s both;
    }
    .cd-item{text-align:center;min-width:48px}
    .cd-num{
      font-family:'Playfair Display',serif;font-size:1.5rem;
      color:#a8ff78;font-weight:700;line-height:1;
    }
    .cd-label{font-size:.58rem;color:rgba(168,255,120,.35);letter-spacing:1.5px;text-transform:uppercase;margin-top:.2rem}
    .cd-sep{font-size:1.2rem;color:rgba(168,255,120,.2);align-self:flex-start;padding-top:.1rem}

    .message{
      margin-top:1.4rem;padding:.9rem 1rem;
      background:rgba(168,255,120,.04);border:1px solid rgba(168,255,120,.1);
      border-radius:10px;font-size:.82rem;color:rgba(255,255,255,.4);
      font-style:italic;line-height:1.75;
      animation:fadeUp .8s 1.2s both;
    }
    .leaf-bottom{margin-top:1.4rem;font-size:1.2rem;opacity:.3;letter-spacing:4px;animation:fadeUp .8s 1.3s both}
    .card-footer{margin-top:1.2rem;padding-top:.8rem;border-top:1px solid rgba(255,255,255,.05);font-size:.68rem;color:rgba(255,255,255,.15);animation:fadeUp .8s 1.4s both}
    .card-footer a{color:rgba(168,255,120,.3);text-decoration:none}

    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>

<div class="card">
  <div class="leaf-top">🌿 ✦ 🌿</div>
  <p class="invite-text">Trân trọng kính mời</p>
  <div class="names">
    <span id="groomName">Minh Anh</span>
    <span class="amp">— & —</span>
    <em id="brideName">Bảo Châu</em>
  </div>
  <div class="green-divider">
    <div class="green-line"></div>
    <span class="green-leaf">🍃</span>
    <div class="green-line"></div>
  </div>
  <div class="info-row"><span class="info-icon">📅</span><span class="info-text" id="weddingDate">Thứ Bảy, 15 tháng 06 năm 2025</span></div>
  <div class="info-row"><span class="info-icon">🕕</span><span class="info-text" id="weddingTime">18:00 – Tiệc tối</span></div>
  <div class="info-row"><span class="info-icon">📍</span><span class="info-text" id="venue">Trung tâm Hội nghị Quốc gia, Hà Nội</span></div>
  <div class="countdown">
    <div class="cd-item"><div class="cd-num" id="cd-days">--</div><div class="cd-label">Ngày</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-item"><div class="cd-num" id="cd-hours">--</div><div class="cd-label">Giờ</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-item"><div class="cd-num" id="cd-mins">--</div><div class="cd-label">Phút</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-item"><div class="cd-num" id="cd-secs">--</div><div class="cd-label">Giây</div></div>
  </div>
  <div class="message" id="message">Sự hiện diện của bạn là món quà quý giá nhất với chúng tôi trong ngày trọng đại này.</div>
  <div class="leaf-bottom">🌱 ✦ 🌱</div>
  <div class="card-footer">Tạo bởi <a href="../index.html">YenTV.wedding</a></div>
</div>

<script>
// Fireflies
for(let i=0;i<18;i++){
  const f=document.createElement('div');f.className='firefly';
  const tx=(Math.random()-0.5)*300,ty=(Math.random()-0.5)*300;
  f.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*6+4}s;animation-delay:${Math.random()*8}s;--tx:${tx}px;--ty:${ty}px;--tx2:${(Math.random()-0.5)*300}px;--ty2:${(Math.random()-0.5)*300}px`;
  document.body.appendChild(f);
}
// Leaves
['🍃','🌿','🍀'].forEach(l=>{
  for(let i=0;i<5;i++){
    const el=document.createElement('div');el.className='leaf';el.textContent=l;
    el.style.cssText=`left:${Math.random()*100}%;animation-duration:${Math.random()*10+8}s;animation-delay:${Math.random()*12}s;--rot:${Math.random()*360}deg;--drift:${(Math.random()-0.5)*150}px`;
    document.body.appendChild(el);
  }
});
// Countdown
function tick(){
  const target=new Date(document.getElementById('weddingDate').dataset.iso||'2025-06-15T18:00:00');
  const diff=target-new Date();
  if(diff<=0){document.querySelector('.countdown').innerHTML='<div style="color:#a8ff78">🎊 Hôm nay là ngày trọng đại!</div>';return}
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  document.getElementById('cd-days').textContent=String(d).padStart(2,'0');
  document.getElementById('cd-hours').textContent=String(h).padStart(2,'0');
  document.getElementById('cd-mins').textContent=String(m).padStart(2,'0');
  document.getElementById('cd-secs').textContent=String(s).padStart(2,'0');
}
tick();setInterval(tick,1000);
const p=new URLSearchParams(window.location.search),id=p.get('id');
if(id){const raw=localStorage.getItem(id);if(raw){const d=JSON.parse(raw);document.getElementById('groomName').textContent=d.groom||'Chú Rể';document.getElementById('brideName').textContent=d.bride||'Cô Dâu';document.getElementById('weddingDate').textContent=d.date||'';document.getElementById('weddingTime').textContent=d.time||'';document.getElementById('venue').textContent=d.venue||'';if(d.msg)document.getElementById('message').textContent=d.msg;document.title=`Thiệp cưới ${d.groom} & ${d.bride}`;}}
</script>
</body>
</html>
